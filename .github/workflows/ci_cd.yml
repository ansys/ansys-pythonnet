name: CI

on:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:


env:
  LIBRARY_NAME: 'ansys-pythonnet'
  MAIN_PYTHON_VERSION: '3.12'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:

  doc-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.12"
        cache-python: true
        activate-environment: true
        enable-cache: true

    - name: Doxygen Action
      uses: mattnotmitt/doxygen-action@1.12.0
      with:
        working-directory: "doc/"

    - name: Synchronize the virtual environment
      run: uv sync --managed-python --no-dev --group doc

    - name: Build Sphinx documentation
      run: |
        uv run sphinx-build doc/source/ ./doc/build/html/

    - name: Upload artifact
      # Automatically uploads an artifact from the './_site' directory by default
      uses: actions/upload-pages-artifact@v5
      with:
        path: doc/build/html/

  doc-deploy:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: doc-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  tests:
    name: Build and Test
    runs-on: ${{ matrix.os.instance }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os:
          - category: windows
            platform: x86
            instance: windows-latest
            suffix:   -windows-x86-none

          - category: windows
            platform: x64
            instance: windows-latest
            suffix:   -windows-x86_64-none

          - category: ubuntu
            platform: x64
            instance: ubuntu-22.04
            suffix:   ""

          - category: ubuntu
            platform: arm64
            instance: ubuntu-22.04-arm
            suffix:   ""

          - category: macos
            platform: x64
            instance: macos-15
            suffix:   -macos-x86_64-none

          - category: macos
            platform: arm64
            instance: macos-15
            suffix:   -macos-aarch64-none

        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

        exclude:
          # Fails with initfs_encoding error
          - os:
              category: windows
              platform: x86
            python: "3.10"

          # Fails to find pytest
          - os:
              category: windows
              platform: x64
            python: '3.10'

          # fails to call mono methods
          - os:
              category: windows
              platform: x86
            python: '3.13'

    env:
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Use main until support for architecture lands
      - name: Setup .NET
        uses: actions/setup-dotnet@main
        with:
          dotnet-version: '10.0'
          architecture: ${{ matrix.os.platform }}

      - run: dotnet restore

      - name: Install Mono
        uses: pythonnet/clr-loader/.github/actions/install-mono@main
        with:
          arch: ${{ matrix.os.platform }}

      - name: Set up Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@v7
        with:
          python-version: cpython-${{ matrix.python }}${{ matrix.os.suffix }}
          cache-python: true
          activate-environment: true
          enable-cache: true

      - name: Synchronize the virtual environment
        run: uv sync --managed-python

      - name: Embedding tests (Mono/.NET Framework)
        if: always()
        run: dotnet test --runtime any-${{ matrix.os.platform }} --framework net472 --logger "console;verbosity=detailed" src/embed_tests/
        env:
          MONO_THREADS_SUSPEND: preemptive # https://github.com/mono/mono/issues/21466

      - name: Embedding tests (.NET Core)
        if: always()
        run: dotnet test --runtime any-${{ matrix.os.platform }} --framework net10.0 --logger "console;verbosity=detailed" src/embed_tests/

      - name: Python Tests (.NET Core)
        if: always()
        run: pytest --runtime coreclr

      - name: Python Tests (Mono)
        if: always()
        run: pytest --runtime mono

      - name: Python Tests (.NET Framework)
        if: ${{ matrix.os.category == 'windows' }}
        run: pytest --runtime netfx

      - name: Python tests run from .NET
        run: dotnet test --runtime any-${{ matrix.os.platform }} src/python_tests_runner/

      - name: "Build library source and wheel artifacts"
        run: |
          uv pip install build twine wheel
          python -m build && python -m twine check dist/*

      - name: "Upload distribution artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-py${{ matrix.python }}-${{ matrix.os.category }}-${{ matrix.os.platform }}-artifacts
          path: dist/
          retention-days: 7

  build-library:
    name: "Build library basic example"
    runs-on: ubuntu-latest
    needs: [doc-build, tests]
    steps:
      - uses: ansys/actions/build-library@v10
        with:
          library-name: ${{ env.LIBRARY_NAME }}

  release:
    name: "Release"
    runs-on: ubuntu-latest
    needs: [build-library]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    steps:

      - name: "Checkout project"
        uses: actions/checkout@v6

      - name: "Install Python ${{ env.MAIN_PYTHON_VERSION }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Install Python requirements"
        run: |
          python -m pip install twine

      - name: "Download the library artifacts from build-library step"
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.LIBRARY_NAME }}-artifacts
          path: ${{ env.LIBRARY_NAME }}-artifacts

      - name: "Release to the public PyPI repository"
        run: |
          python -m twine upload --verbose --skip-existing ${{ env.LIBRARY_NAME }}-artifacts/*.whl
          python -m twine upload --verbose --skip-existing ${{ env.LIBRARY_NAME }}-artifacts/*.tar.gz
        env:
          TWINE_USERNAME: '__token__'
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: 'https://upload.pypi.org/legacy/'
