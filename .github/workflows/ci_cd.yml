name: CI

on:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:


env:
  LIBRARY_NAME: 'ansys-pythonnet'
  MAIN_PYTHON_VERSION: '3.11'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:

  doc-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Doxygen Action
      uses: mattnotmitt/doxygen-action@1.9.4
      with:
        working-directory: "doc/"

    - name: Build Sphinx documentation
      run: |
        pip install -r doc/requirements.txt
        sphinx-build doc/source/ ./doc/build/html/

    - name: Upload artifact
      # Automatically uploads an artifact from the './_site' directory by default
      uses: actions/upload-pages-artifact@v4
      with:
        path: doc/build/html/

  tests:
    name: Build and Test
    runs-on: ${{ matrix.os.instance }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os:
          - category: windows
            platform: x86
            instance: windows-latest

          - category: windows
            platform: x64
            instance: windows-latest

          - category: ubuntu
            platform: x64
            instance: ubuntu-22.04

          - category: ubuntu
            platform: arm64
            instance: ubuntu-22.04-arm

          - category: macos
            platform: x64
            instance: macos-14

          - category: macos
            platform: arm64
            instance: macos-14-arm64

        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set Environment on macOS
        uses: maxim-lobanov/setup-xamarin@v1
        if: ${{ matrix.os.category == 'macos' }}
        with:
          mono-version: latest

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Set up Python ${{ matrix.python }}
        uses: astral-sh/setup-uv@v7
        with:
          architecture: ${{ matrix.os.platform }}
          python-version: ${{ matrix.python }}
          cache-python: true
          activate-environment: true
          enable-cache: true

      - name: Synchronize the virtual environment
        run: uv sync --managed-python

      - name: Show pyvenv.cfg
        run: cat .venv/pyvenv.cfg

      - name: Embedding tests (Mono/.NET Framework)
        run: dotnet test --runtime any-${{ matrix.os.platform }} --framework net472 --logger "console;verbosity=detailed" src/embed_tests/
        if: always()
        env:
          MONO_THREADS_SUSPEND: preemptive # https://github.com/mono/mono/issues/21466

      - name: Embedding tests (.NET Core)
        run: dotnet test --runtime any-${{ matrix.os.platform }} --framework net10.0 --logger "console;verbosity=detailed" src/embed_tests/
        if: always()

      - name: Python Tests (Mono)
        if: ${{ matrix.os.category != 'windows' }}
        run: pytest --runtime mono

      - name: Python Tests (.NET Core)
        run: pytest --runtime coreclr

      - name: Python Tests (.NET Framework)
        if: ${{ matrix.os.category == 'windows' }}
        run: pytest --runtime netfx

      - name: Python tests run from .NET
        # For some reason, it won't find pytest on the Windows + 3.10
        # combination, which hints that it does not handle the venv properly in
        # this combination.
        if: ${{ matrix.os.category != 'windows' || matrix.python != '3.10' }}
        run: dotnet test --runtime any-${{ matrix.os.platform }} src/python_tests_runner/

      - name: "Build library source and wheel artifacts"
        run: |
          uv pip install build twine wheel
          python -m build && python -m twine check dist/*

      - name: "Upload distribution artifact"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-py${{ matrix.python }}-${{ matrix.os.category }}-${{ matrix.os.platform }}-artifacts
          path: dist/
          retention-days: 7

  build-library:
    name: "Build library basic example"
    runs-on: ubuntu-latest
    needs: [doc-build, tests]
    steps:
      - uses: ansys/actions/build-library@v4
        with:
          library-name: ${{ env.LIBRARY_NAME }}

  release:
    name: "Release"
    runs-on: ubuntu-latest
    needs: [build-library]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags')
    steps:

      - name: "Checkout project"
        uses: actions/checkout@v6

      - name: "Install Python ${{ env.MAIN_PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MAIN_PYTHON_VERSION }}

      - name: "Install Python requirements"
        run: |
          python -m pip install twine

      - name: "Download the library artifacts from build-library step"
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.LIBRARY_NAME }}-artifacts
          path: ${{ env.LIBRARY_NAME }}-artifacts

      - name: "Release to the public PyPI repository"
        run: |
          python -m twine upload --verbose --skip-existing ${{ env.LIBRARY_NAME }}-artifacts/*.whl
          python -m twine upload --verbose --skip-existing ${{ env.LIBRARY_NAME }}-artifacts/*.tar.gz
        env:
          TWINE_USERNAME: '__token__'
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          TWINE_REPOSITORY_URL: 'https://upload.pypi.org/legacy/'
